<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 240" fill="none" role="img" aria-label="Posture corrector back brace">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="400" y2="240" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F0F4FF"/><stop offset="1" stop-color="#E2EAFF"/>
    </linearGradient>
    <linearGradient id="strap" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#3A5BF0"/><stop offset="1" stop-color="#1D3FE6"/>
    </linearGradient>
  </defs>
  <rect width="400" height="240" fill="url(#bg)"/>
  <circle cx="200" cy="120" r="92" fill="#fff" opacity="0.5"/>
  <ellipse cx="200" cy="206" rx="78" ry="12" fill="#0B1220" opacity="0.06"/>
  <!-- torso (back view) -->
  <path d="M150 70 C150 56 170 50 200 50 C230 50 250 56 250 70 L244 176 C244 192 224 198 200 198 C176 198 156 192 156 176 Z" fill="#D7DEF0"/>
  <path d="M150 70 C150 56 170 50 200 50 C230 50 250 56 250 70 L248 96 L152 96 Z" fill="#C7D0E8"/>
  <!-- shoulder X straps -->
  <path d="M168 64 L238 150" stroke="url(#strap)" stroke-width="17" stroke-linecap="round"/>
  <path d="M232 64 L162 150" stroke="url(#strap)" stroke-width="17" stroke-linecap="round"/>
  <!-- waist band -->
  <rect x="150" y="158" width="100" height="26" rx="9" fill="url(#strap)"/>
  <rect x="190" y="163" width="20" height="16" rx="4" fill="#fff" opacity="0.85"/>
  <circle cx="200" cy="107" r="9" fill="#1D3FE6"/>
</svg>
