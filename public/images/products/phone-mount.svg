<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 240" fill="none" role="img" aria-label="360 degree magnetic phone mount">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="400" y2="240" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F0F4FF"/><stop offset="1" stop-color="#E2EAFF"/>
    </linearGradient>
    <linearGradient id="phone" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#222B45"/><stop offset="1" stop-color="#0B1220"/>
    </linearGradient>
  </defs>
  <rect width="400" height="240" fill="url(#bg)"/>
  <circle cx="200" cy="118" r="92" fill="#fff" opacity="0.5"/>
  <!-- 360 rotation arc -->
  <path d="M118 118 A82 82 0 1 1 122 150" stroke="#9FB0FF" stroke-width="6" stroke-linecap="round" fill="none" stroke-dasharray="3 14"/>
  <path d="M122 150 l-12 -2 6 12z" fill="#9FB0FF"/>
  <ellipse cx="200" cy="210" rx="46" ry="9" fill="#0B1220" opacity="0.07"/>
  <!-- base + arm -->
  <ellipse cx="200" cy="200" rx="40" ry="13" fill="#1D3FE6"/>
  <rect x="193" y="150" width="14" height="52" rx="6" fill="#3A5BF0"/>
  <circle cx="200" cy="150" r="11" fill="#152CB0"/>
  <!-- phone (tilted) -->
  <g transform="rotate(-12 200 110)">
    <rect x="160" y="56" width="80" height="116" rx="14" fill="url(#phone)"/>
    <rect x="168" y="64" width="64" height="100" rx="8" fill="#2E6BFF"/>
    <rect x="176" y="74" width="48" height="8" rx="4" fill="#fff" opacity="0.55"/>
    <rect x="176" y="90" width="34" height="6" rx="3" fill="#fff" opacity="0.4"/>
    <circle cx="200" cy="60" r="2.4" fill="#fff" opacity="0.7"/>
  </g>
  <circle cx="200" cy="150" r="4.5" fill="#FF4D8D"/>
</svg>
